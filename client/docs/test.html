<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <div class="max-w-sm rounded-xl overflow-hidden shadow-lg bg-white p-6">
        <!-- 卡片头部 -->
        <div class="flex items-center mb-4">
            <img class="w-12 h-12 rounded-full mr-4" src="/avatar.jpg" alt="Avatar">
            <div>
                <div class="text-xl font-bold text-gray-900">张三</div>
                <p class="text-gray-600 text-sm">前端开发者</p>
            </div>
        </div>
        <!-- 卡片内容 -->
        <p class="text-gray-700">
            这是一个使用Tailwind CSS构建的卡片组件。所有样式，包括布局、间距、颜色、圆角、阴影，都通过工具类直接应用。
        </p>
        <!-- 卡片底部按钮 -->
        <div class="mt-6">
            <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
                关注
            </button>
        </div>
    </div>
</body>

</html>
